# User Queries

# Get all users
query GetUsers {
  users {
    id
    name
    email
    createdAt
    posts {
      id
      title
      published
    }
  }
}

# Get single user by ID
query GetUser($id: ID!) {
  user(id: $id) {
    id
    name
    email
    createdAt
    posts {
      id
      title
      content
      published
      createdAt
    }
  }
}
